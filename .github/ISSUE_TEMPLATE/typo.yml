name: "错别字"
description: "站点中有错字、拼写错误，或词语、语法使用问题"
title: "【错别字】"
labels: ["错别字"]
body:
  - type: input
    id: post_id
    attributes:
      label: "页面 URL"
      description: "您认为有误的页面 URL"
      placeholder: "如 https://plaintext.stream/about/index.html"
    validations:
      required: true
  - type: textarea
    id: original_text
    attributes:
      label: "原文"
      description: "引用原文您认为错误的部分"
      placeholder: "Intentionallly missspellling heere..."
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: "正确写法"
      description: "请指出正确写法，如果有必要请同时指出原因"
      placeholder: "Intentionally spelling correctly here..."
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: 您确认您的信息准确吗？
      description: 请确认您已经包括了所有有用的信息
      options:
        - label: 是的
          required: true
